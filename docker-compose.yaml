version: '3.8'

services:
  # Redis Cache (completely internal)
  redis:
    image: redis:7-alpine
    container_name: ias-redis
    restart: unless-stopped
    expose:
      - "6379"  # Only exposes to linked containers, not to host
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ias-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Your API Service
  api:
    image: ias-api:0.01
    container_name: ias-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_INVALIDATION_SECOND=60
      - HTTP_SERVER_PORT=8080
      - HTTP_SERVER_AUTOSTART=true
      - POSTGRES_HOST=
      - POSTGRES_PORT=5431
      - POSTGRES_USER=ias_admin
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=ias
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ias-network

volumes:
  redis-data:
    driver: local

networks:
  ias-network:
    driver: bridge